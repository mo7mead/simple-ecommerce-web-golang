{{define "content"}}
<div class="section-title">Active sessions</div>
{{if .Sessions}}
<table>
	<thead><tr><th>User</th><th>Started</th><th>Expires</th></tr></thead>
	<tbody>
		{{range .Sessions}}
		<tr>
			<td><div class="avatar-row"><span class="avatar-sm">{{if .AvatarPath}}<img src="{{.AvatarPath}}" alt="">{{else}}{{slice .Username 0 1}}{{end}}</span>{{.Username}}</div></td>
			<td>{{fmtTime .CreatedAt}}</td>
			<td>{{fmtTime .ExpiresAt}}</td>
		</tr>
		{{end}}
	</tbody>
</table>
{{else}}
<p class="muted">No active sessions.</p>
{{end}}
{{end}}
