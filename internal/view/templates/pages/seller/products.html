{{define "content"}}
{{if .Error}}<div class="error" style="margin-bottom: 16px;">{{.Error}}</div>{{end}}

<div class="section-title">Add product</div>
<form method="POST" action="/seller/products" class="inline">
	<label>Name <input type="text" name="name" required></label>
	<label>Price <input type="number" name="price" step="0.01" min="0" value="0.00" required></label>
	<label>Stock <input type="number" name="stock" min="0" value="0" required></label>
	<button type="submit">Add product</button>
</form>

<div class="section-title">Your products</div>
{{if .Products}}
<table>
	<thead><tr><th>ID</th><th>Name</th><th>Price</th><th>Stock</th><th>Added</th><th></th></tr></thead>
	<tbody>
		{{range .Products}}
		<tr>
			<td>{{.ID}}</td>
			<td>{{.Name}}</td>
			<td>${{printf "%.2f" .Price}}</td>
			<td>{{.Stock}}</td>
			<td>{{fmtTime .CreatedAt}}</td>
			<td>
				<form method="POST" action="/seller/products/delete" style="margin: 0;">
					<input type="hidden" name="id" value="{{.ID}}">
					<button type="submit" class="action-btn" onclick="return confirm('Delete this product?')">Delete</button>
				</form>
			</td>
		</tr>
		{{end}}
	</tbody>
</table>
{{else}}
<p class="muted">No products yet. Use the form above to add one.</p>
{{end}}
{{end}}
