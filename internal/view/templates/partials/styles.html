{{define "styles"}}<style>
	:root { --bg: #f7f8fa; --card: #fff; --border: #e5e7eb; --ink: #1a1d22; --muted: #6b7280; --accent: #4ea1ff; --accent-hover: #2f8aef; --sidebar: #1a1d22; --sidebar-hover: #2a2e36; }
	* { box-sizing: border-box; }
	body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; min-height: 100vh; background: var(--bg); color: var(--ink); }
	h1 { margin: 0 0 24px; font-size: 28px; }
	a { color: var(--accent); }
	form { display: flex; flex-direction: column; gap: 12px; max-width: 320px; }
	label { font-size: 14px; color: #374151; }
	input { padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 15px; background: #fff; }
	button { padding: 10px 16px; background: var(--accent); color: white; border: 0; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; }
	button:hover { background: var(--accent-hover); }
	.error { background: #ffe8e8; color: #a30000; padding: 10px 12px; border-radius: 6px; font-size: 14px; }
	.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
	.card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
	.card .label { color: var(--muted); font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }
	.card .value { font-size: 28px; font-weight: 600; }
	table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
	th, td { text-align: left; padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 14px; }
	th { background: #fafafa; color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 12px; letter-spacing: 0.04em; }
	tr:last-child td { border-bottom: 0; }
	.section-title { font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin: 24px 0 12px; }
	.muted { color: var(--muted); }
	.hero { display: grid; grid-template-columns: 1.3fr 1fr; gap: 48px; align-items: center; margin: 8px 0 56px; }
	.hero-text .eyebrow { display: inline-block; background: rgba(78, 161, 255, 0.12); color: var(--accent); font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 10px; border-radius: 999px; margin-bottom: 16px; }
	.hero-text h2 { font-size: 36px; line-height: 1.15; margin: 0 0 16px; font-weight: 700; letter-spacing: -0.01em; }
	.hero-text p { font-size: 17px; line-height: 1.5; color: var(--muted); margin: 0 0 24px; }
	.cta { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
	.btn { display: inline-block; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 15px; }
	.btn.primary { background: var(--accent); color: #fff; }
	.btn.primary:hover { background: var(--accent-hover); }
	.btn.ghost { background: transparent; color: var(--ink); border: 1px solid var(--border); }
	.btn.ghost:hover { background: #eef0f3; }
	.creds { font-size: 13px; color: var(--muted); }
	.creds code { background: #eef0f3; padding: 2px 6px; border-radius: 4px; font-size: 12px; color: var(--ink); }
	.hero-card { background: #0f1216; color: #d7d9de; border-radius: 12px; padding: 20px 22px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; box-shadow: 0 20px 50px -20px rgba(0,0,0,0.4); }
	.hero-card-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #20242b; }
	.hero-card-row.last { border-bottom: 0; }
	.hero-card-row span { color: var(--accent); font-weight: 700; }
	.hero-card-row code { color: #d7d9de; background: transparent; padding: 0; }
	.card-icon { font-size: 24px; margin-bottom: 12px; }
	.card-title { font-weight: 600; font-size: 15px; margin-bottom: 6px; }
	.stack { list-style: none; padding: 0; margin: 0; display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; }
	.stack li { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; font-size: 14px; color: var(--muted); }
	.stack li strong { color: var(--ink); }
	code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
	@media (max-width: 720px) { .hero { grid-template-columns: 1fr; gap: 24px; } .hero-text h2 { font-size: 28px; } }

	.slider { position: relative; border-radius: 14px; overflow: hidden; background: #0f1216; box-shadow: 0 20px 50px -20px rgba(0,0,0,0.4); margin: 24px 0 32px; aspect-ratio: 16 / 6; max-height: 340px; }
	.slider .track { position: absolute; inset: 0; display: flex; transition: transform 0.6s cubic-bezier(0.65, 0, 0.35, 1); }
	.slider .slide { flex: 0 0 100%; position: relative; }
	.slider .slide img { width: 100%; height: 100%; object-fit: cover; display: block; }
	.slider .caption { position: absolute; left: 0; right: 0; bottom: 0; padding: 28px 32px; background: linear-gradient(transparent, rgba(0,0,0,0.75)); color: #fff; }
	.slider .caption h3 { margin: 0 0 6px; font-size: 24px; }
	.slider .caption p { margin: 0; font-size: 15px; opacity: 0.9; max-width: 600px; }
	.slider .nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.4); color: #fff; border: 0; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
	.slider .nav:hover { background: rgba(0,0,0,0.6); }
	.slider .nav.prev { left: 16px; }
	.slider .nav.next { right: 16px; }
	.slider .dots { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 2; }
	.slider .dots button { width: 8px; height: 8px; border-radius: 50%; border: 0; background: rgba(255,255,255,0.4); cursor: pointer; padding: 0; }
	.slider .dots button.active { background: #fff; width: 22px; border-radius: 4px; }

	.page-sub { color: var(--muted); margin: -8px 0 24px; font-size: 15px; }
	.alert { padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 20px; }
	.alert.error { background: #ffe8e8; color: #a30000; border: 1px solid #ffc9c9; }
	.section-head { display: flex; align-items: center; gap: 12px; margin: 0 0 16px; }
	.badge-count { background: #eef0f3; color: var(--muted); font-size: 12px; font-weight: 600; padding: 2px 10px; border-radius: 999px; }

	.slides-layout { display: grid; grid-template-columns: minmax(320px, 380px) 1fr; gap: 28px; align-items: flex-start; }
	@media (max-width: 980px) { .slides-layout { grid-template-columns: 1fr; } }

	.upload-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; display: flex; flex-direction: column; gap: 16px; max-width: none; position: sticky; top: 24px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
	.upload-card-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 4px; }
	.upload-card-head h2 { margin: 0; font-size: 17px; font-weight: 600; }
	.upload-card-head .muted { font-size: 12px; }
	.upload-card-actions { display: flex; justify-content: flex-end; padding-top: 8px; border-top: 1px solid var(--border); }
	.field { display: flex; flex-direction: column; gap: 6px; }
	.field-label { font-size: 13px; font-weight: 600; color: #374151; }
	.upload-card textarea { padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; background: #fff; font-family: inherit; resize: vertical; }
	.upload-card input[type=text], .upload-card textarea { font-size: 14px; }

	.dropzone { display: block; border: 2px dashed var(--border); border-radius: 10px; background: #fafbfc; padding: 22px; text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
	.dropzone:hover, .dropzone.drag { border-color: var(--accent); background: #f1f7ff; }
	.dropzone-icon { font-size: 28px; color: var(--accent); margin-bottom: 8px; }
	.dropzone-empty strong { font-size: 14px; color: #374151; }
	.dropzone-preview { display: flex; flex-direction: column; align-items: center; gap: 8px; }
	.dropzone-preview img { width: 100%; max-height: 160px; object-fit: cover; border-radius: 6px; background: #eef0f3; }
	.dropzone-filename { font-size: 13px; color: var(--muted); word-break: break-all; }
	.link-btn { background: transparent; border: 0; color: var(--accent); cursor: pointer; padding: 0; font: inherit; text-decoration: underline; font-size: 13px; }

	.slides-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
	.slide-card { position: relative; background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; transition: transform 0.15s, box-shadow 0.15s; }
	.slide-card:hover { transform: translateY(-2px); box-shadow: 0 10px 30px -12px rgba(0,0,0,0.18); }
	.slide-card:hover .slide-card-delete { opacity: 1; }
	.slide-card-img { aspect-ratio: 16 / 10; background: #eef0f3; }
	.slide-card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
	.slide-card-body { padding: 14px 16px 16px; }
	.slide-card-title { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
	.slide-card-text { color: var(--muted); font-size: 13px; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
	.slide-card-meta { font-size: 12px; }
	.slide-card-delete { position: absolute; top: 10px; right: 10px; margin: 0; opacity: 0; transition: opacity 0.15s; }
	.slide-card-delete button { width: 28px; height: 28px; border-radius: 50%; background: rgba(0,0,0,0.6); color: #fff; border: 0; cursor: pointer; font-size: 18px; line-height: 1; display: flex; align-items: center; justify-content: center; padding: 0; }
	.slide-card-delete button:hover { background: #c00; }

	.empty-state { background: var(--card); border: 1px dashed var(--border); border-radius: 12px; padding: 48px 24px; text-align: center; }
	.empty-icon { font-size: 36px; margin-bottom: 12px; }
	.empty-title { font-weight: 600; font-size: 16px; margin-bottom: 6px; }

	.slide-card { cursor: grab; user-select: none; }
	.slide-card:active { cursor: grabbing; }
	.slide-card.dragging { opacity: 0.4; transform: scale(0.98); box-shadow: 0 18px 40px -10px rgba(0,0,0,0.3); }
	.slide-card-handle { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.55); color: #fff; font-size: 14px; line-height: 1; padding: 5px 7px; border-radius: 6px; opacity: 0; transition: opacity 0.15s; pointer-events: none; letter-spacing: -1px; }
	.slide-card:hover .slide-card-handle { opacity: 1; }
	.slides-grid { min-height: 100px; }
	.save-status { font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 999px; transition: opacity 0.2s; }
	.save-status:empty { display: none; }
	.save-status.ok { background: #e3f8ec; color: #1c7a3f; }
	.save-status.err { background: #ffe8e8; color: #a30000; }
	.save-status:not(.ok):not(.err) { background: #eef0f3; color: var(--muted); }

	.upload-card select { padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; background: #fff; font-family: inherit; }
	.cat-tree { display: flex; flex-direction: column; gap: 4px; }
	.cat-row { display: flex; flex-direction: column; gap: 4px; }
	.cat-row-line { display: flex; align-items: center; gap: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; }
	.cat-row-ico { font-size: 18px; line-height: 1; }
	.cat-row-name { font-weight: 600; font-size: 14px; }
	.cat-row-slug { font-size: 13px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
	.cat-row-children { margin-left: 24px; border-left: 2px solid var(--border); padding-left: 12px; display: flex; flex-direction: column; gap: 4px; }

	.crumbs { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); margin: -8px 0 16px; flex-wrap: wrap; }
	.crumbs a { color: var(--muted); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
	.crumbs a:hover { color: var(--accent); }
	.crumbs a:last-child { color: var(--ink); font-weight: 600; }
	.cat-hero { display: flex; align-items: center; gap: 20px; margin-bottom: 32px; }
	.cat-hero-ico { font-size: 56px; line-height: 1; width: 88px; height: 88px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; display: flex; align-items: center; justify-content: center; }
	.cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
	.cat-card { display: flex; flex-direction: column; gap: 8px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-decoration: none; color: var(--ink); transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s; }
	.cat-card:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow: 0 10px 30px -12px rgba(0,0,0,0.18); }
	.cat-card-ico { font-size: 28px; line-height: 1; }
	.cat-card-name { font-weight: 600; font-size: 15px; }
	.cat-card-slug { font-size: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

	.brand-preview { background: linear-gradient(135deg, #1a1d22 0%, #2a3245 100%); border-radius: 12px; padding: 24px; }
	.brand-preview-nav { display: flex; align-items: center; gap: 14px; color: #fff; min-width: 0; }
	.brand-preview-nav img { height: 32px; width: auto; max-width: 200px; object-fit: contain; display: block; flex-shrink: 0; }
	.brand-preview-name { font-size: 18px; font-weight: 700; word-break: break-word; }
	.brand-preview-tag { font-size: 12px; color: #9aa0a6; margin-top: 2px; }

	.logo-swatch { display: flex; align-items: center; gap: 12px; background: #1a1d22; padding: 12px 16px; border-radius: 8px; margin-bottom: 8px; max-width: 100%; }
	.logo-swatch-img { flex: 1; min-width: 0; display: flex; align-items: center; justify-content: flex-start; height: 40px; overflow: hidden; }
	.logo-swatch-img img { max-height: 40px; max-width: 100%; width: auto; height: auto; object-fit: contain; display: block; }
	.logo-preview { width: 100%; }
	.logo-preview-frame { width: 100%; height: 120px; background: repeating-conic-gradient(#e5e7eb 0% 25%, #f7f8fa 0% 50%) 50% / 16px 16px; border: 1px solid var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 8px; }
	.logo-preview-frame img { max-width: 100%; max-height: 100%; width: auto; height: auto; object-fit: contain; display: block; background: transparent; padding: 0; }
</style>{{end}}
